<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Muhammad Shayan — CS + AI GitHub profile header</title>
<desc>Terminal-style animated header with typing effect, floating particles, and skill badges</desc>

<defs>
  <clipPath id="nc"><rect x="38" y="56" width="430" height="44"/></clipPath>

  <!-- Typing reveal clips using SMIL -->
  <clipPath id="c1"><rect x="36" y="30" height="22">
    <animate attributeName="width" from="0" to="500" dur="0.7s" begin="0.3s" fill="freeze"/>
  </rect></clipPath>
  <clipPath id="c2"><rect x="36" y="98" height="22">
    <animate attributeName="width" from="0" to="420" dur="0.6s" begin="1.3s" fill="freeze"/>
  </rect></clipPath>
  <clipPath id="c3"><rect x="36" y="122" height="22">
    <animate attributeName="width" from="0" to="440" dur="0.6s" begin="2.0s" fill="freeze"/>
  </rect></clipPath>
  <clipPath id="c4"><rect x="36" y="146" height="22">
    <animate attributeName="width" from="0" to="400" dur="0.5s" begin="2.7s" fill="freeze"/>
  </rect></clipPath>
  <clipPath id="c5"><rect x="36" y="170" height="30">
    <animate attributeName="width" from="0" to="500" dur="0.4s" begin="3.3s" fill="freeze"/>
  </rect></clipPath>

  <mask id="gm" maskUnits="userSpaceOnUse">
    <rect x="0" y="0" width="680" height="220" fill="white"/>
    <rect x="36" y="32" width="76" height="18" fill="black" rx="2"/>
    <rect x="147" y="32" width="210" height="18" fill="black" rx="2"/>
    <rect x="36" y="60" width="240" height="38" fill="black" rx="2"/>
    <rect x="36" y="102" width="390" height="18" fill="black" rx="2"/>
    <rect x="36" y="126" width="400" height="18" fill="black" rx="2"/>
    <rect x="36" y="150" width="365" height="18" fill="black" rx="2"/>
    <rect x="38" y="176" width="150" height="22" fill="black" rx="4"/>
    <rect x="196" y="176" width="132" height="22" fill="black" rx="4"/>
    <rect x="336" y="176" width="132" height="22" fill="black" rx="4"/>
  </mask>
</defs>

<!-- Background -->
<rect width="680" height="220" rx="12" fill="#0d1117"/>

<!-- Grid lines -->
<line x1="0" y1="40"  x2="680" y2="40"  mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="0" y1="80"  x2="680" y2="80"  mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="0" y1="120" x2="680" y2="120" mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="0" y1="160" x2="680" y2="160" mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="100" y1="0" x2="100" y2="220" mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="200" y1="0" x2="200" y2="220" mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="300" y1="0" x2="300" y2="220" mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="400" y1="0" x2="400" y2="220" mask="url(#gm)" stroke="#ffffff" stroke-width="0.4" opacity="0.1"/>
<line x1="500" y1="0" x2="500" y2="220" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
<line x1="600" y1="0" x2="600" y2="220" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>

<!-- Floating particles — SMIL animateTransform -->
<circle cx="612" cy="44" r="3" fill="#7F77DD" opacity="0.6">
  <animateTransform attributeName="transform" type="translate" values="0,0;-6,-10;0,0" dur="4.2s" begin="1.5s" repeatCount="indefinite"/>
</circle>
<circle cx="642" cy="82" r="2" fill="#1D9E75" opacity="0.7">
  <animateTransform attributeName="transform" type="translate" values="0,0;5,-12;0,0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
</circle>
<circle cx="582" cy="112" r="3.5" fill="#D85A30" opacity="0.65">
  <animateTransform attributeName="transform" type="translate" values="0,0;-4,8;0,0" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>
</circle>
<circle cx="622" cy="148" r="2" fill="#7F77DD" opacity="0.55">
  <animateTransform attributeName="transform" type="translate" values="0,0;7,-7;0,0" dur="4.6s" begin="0.4s" repeatCount="indefinite"/>
</circle>
<circle cx="658" cy="56" r="2.5" fill="#1D9E75" opacity="0.7">
  <animateTransform attributeName="transform" type="translate" values="0,0;-8,6;0,0" dur="5.3s" begin="2s" repeatCount="indefinite"/>
</circle>
<circle cx="598" cy="176" r="2" fill="#D85A30" opacity="0.6">
  <animateTransform attributeName="transform" type="translate" values="0,0;4,-9;0,0" dur="4s" begin="1.8s" repeatCount="indefinite"/>
</circle>
<circle cx="638" cy="190" r="1.5" fill="#7F77DD" opacity="0.5">
  <animateTransform attributeName="transform" type="translate" values="0,0;-5,5;0,0" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
</circle>
<circle cx="665" cy="130" r="2" fill="#1D9E75" opacity="0.6">
  <animateTransform attributeName="transform" type="translate" values="0,0;6,-8;0,0" dur="4.8s" begin="2.4s" repeatCount="indefinite"/>
</circle>

<!-- Line 1: ~/  prompt — typing reveal -->
<text x="40" y="48" font-family="ui-monospace,'Cascadia Code',monospace" font-size="12" fill="#7F77DD" clip-path="url(#c1)">~/</text>
<text x="60" y="48" font-family="ui-monospace,'Cascadia Code',monospace" font-size="12" fill="#8b949e" clip-path="url(#c1)">  —  cs + ai, coventry university</text>

<!-- Name — fade in -->
<text x="40" y="90" font-family="ui-monospace,'Cascadia Code',monospace" font-size="26" font-weight="600" fill="#e6edf3" clip-path="url(#nc)">
  muhammad shayan
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.1s" fill="freeze"/>
</text>

<!-- Blinking cursor (SMIL) -->
<rect x="276" y="68" width="2" height="22" rx="1" fill="#7F77DD">
  <animate attributeName="opacity" values="1;1;0;0;1" dur="1s" begin="0.1s" repeatCount="8"/>
  <animate attributeName="opacity" values="0" dur="1s" begin="8.1s" fill="freeze"/>
</rect>

<!-- Lines 2-4: typing reveal -->
<text x="40" y="116" font-family="ui-monospace,'Cascadia Code',monospace" font-size="13" fill="#1D9E75" clip-path="url(#c2)">&#9658;  OCR · ML · game dev · secure systems · full-stack</text>
<text x="40" y="140" font-family="ui-monospace,'Cascadia Code',monospace" font-size="12" fill="#8b949e" clip-path="url(#c3)">   bsc cs+ai grad (july 2026) · open to swe, ml/ai &amp; game dev</text>
<text x="40" y="164" font-family="ui-monospace,'Cascadia Code',monospace" font-size="12" fill="#8b949e" clip-path="url(#c4)">   anime marathons · exploring game dev · lo-fi sessions</text>

<!-- Bottom accent line -->
<rect x="40" y="209" width="600" height="2" rx="1" fill="#7F77DD" opacity="0.32"/>

<!-- Skill badges — reveal together -->
<g clip-path="url(#c5)">
  <!-- Badge 1: python · pytorch -->
  <rect x="40" y="178" width="148" height="22" rx="4" fill="#7F77DD" fill-opacity="0.15"/>
  <rect x="40" y="178" width="148" height="22" rx="4" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-opacity="0.5"/>
  <text font-family="ui-monospace,monospace" font-size="11" fill="#7F77DD" text-anchor="middle" x="114" y="193">python · pytorch</text>

  <!-- Badge 2: flask · sqlite -->
  <rect x="196" y="178" width="132" height="22" rx="4" fill="#1D9E75" fill-opacity="0.15"/>
  <rect x="196" y="178" width="132" height="22" rx="4" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-opacity="0.5"/>
  <text font-family="ui-monospace,monospace" font-size="11" fill="#1D9E75" text-anchor="middle" x="262" y="193">flask · sqlite</text>

  <!-- Badge 3: godot · unity -->
  <rect x="336" y="178" width="132" height="22" rx="4" fill="#D85A30" fill-opacity="0.15"/>
  <rect x="336" y="178" width="132" height="22" rx="4" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-opacity="0.5"/>
  <text font-family="ui-monospace,monospace" font-size="11" fill="#D85A30" text-anchor="middle" x="402" y="193">godot · unity</text>
</g>

</svg>
